services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - path: .env.docker
        required: false
    volumes:
      - ./backend/db.sqlite3:/app/db.sqlite3
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/exams/', timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${APP_BIND_IP:-127.0.0.1}:${APP_PORT:-18080}:80"
